spring:
  application:
    name: swiftcrew-backend

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:swiftcrew}
    username: ${DB_USER:swiftcrew}
    password: ${DB_PASSWORD:swiftcrew123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8080

cors:
  allowed-origins: http://localhost:5173

jwt:
  secret: ${JWT_SECRET:swiftcrew-dev-secret-key-at-least-256-bits-long-for-hs256-signing}
  expiration: 86400000
